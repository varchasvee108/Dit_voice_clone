[project]
name = "Text_diffusion"
seed = 1008


[data]
dataset = 'roneneldan/tinystories'
block_size = 256
batch_size = 64
tokenizer = 'gpt2'
embd_dim = 256



[model]
num_layers =4
num_heads = 4
dropout = 0.1
hidden_dim = 512
time_embed = 256

[training]
lr = 3e-4
max_steps = 10000
warmup_steps = 1000
betas = [0.9, 0.95]
weight_decay = 0.1
grad_clip = 1.0
eval_interval = 500
save_interval = 500
scheduler = 'cosine'

[diffusion]
timesteps = 500
beta_schedule = 'linear'
beta_start = 0.0001
beta_end = 0.02



